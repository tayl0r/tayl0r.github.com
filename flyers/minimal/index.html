<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyers — Taylor Steil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #111111;
    --surface: #181818;
    --rule: #2a2a2a;
    --rule-hover: #3a3a3a;
    --text: #e5e5e5;
    --text-dim: #8a8a8a;
    --text-faint: #888888;
    --accent: #c8c8c8;
    --white: #ffffff;
  }

  html {
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Page shell ── */
  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 32px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    padding-top: 120px;
    padding-bottom: 80px;
  }

  .issue-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.6875rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 24px;
  }

  .title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 300;
    font-size: clamp(3.5rem, 8vw, 6rem);
    letter-spacing: -0.04em;
    line-height: 0.9;
    color: var(--white);
  }

  /* ── Top rule ── */
  .rule {
    width: 100%;
    height: 1px;
    background: var(--rule);
  }

  .rule--heavy {
    height: 2px;
    background: var(--text-dim);
  }

  /* ── Column headers ── */
  .col-headers {
    display: flex;
    align-items: baseline;
    padding: 14px 0;
    border-bottom: 1px solid var(--rule);
  }

  .col-header {
    font-family: 'Inter', sans-serif;
    font-size: 0.625rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  .col-header--date {
    width: 140px;
    flex-shrink: 0;
  }

  .col-header--title {
    flex: 1;
  }

  /* ── Flyer entries ── */
  .entries {
    flex: 1;
  }

  .entry {
    display: flex;
    align-items: baseline;
    text-decoration: none;
    color: inherit;
    padding: 20px 0;
    border-bottom: 1px solid var(--rule);
    transition: border-color 0.2s ease;
  }

  .entry-date {
    width: 140px;
    flex-shrink: 0;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8125rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-faint);
    transition: color 0.2s ease;
  }

  .entry-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }

  .entry-time {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-faint);
    letter-spacing: 0.02em;
  }

  .entry-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.125rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
    transition: color 0.2s ease;
  }

  .entry-arrow {
    flex-shrink: 0;
    font-family: 'Inter', sans-serif;
    font-size: 0.8125rem;
    color: var(--text-faint);
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    margin-left: 16px;
  }

  .entry:hover {
    border-bottom-color: var(--rule-hover);
  }

  .entry:hover .entry-title {
    color: var(--white);
  }

  .entry:hover .entry-date {
    color: var(--text-dim);
  }

  .entry:hover .entry-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  .entry:focus-visible {
    outline: 1px solid var(--accent);
    outline-offset: 4px;
  }

  /* ── Alternate links ── */
  .entry-alternates {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0 16px;
    border-bottom: 1px solid var(--rule);
  }

  .entry-alt-link {
    font-family: 'Inter', sans-serif;
    font-size: 0.6875rem;
    font-weight: 400;
    color: var(--text-faint);
    text-decoration: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.2s ease;
  }

  .entry-alt-link:hover {
    color: var(--text);
  }

  .entry-alt-link:focus-visible {
    outline: 1px solid var(--accent);
    outline-offset: 2px;
  }

  .entry-alt-link--active {
    color: var(--text-dim);
  }

  .entry-alt-sep {
    color: var(--text-faint);
    font-size: 0.5rem;
    opacity: 0.5;
  }

  /* ── Footer ── */
  .footer {
    padding: 48px 0 64px;
    margin-top: auto;
  }

  .footer-rule {
    width: 100%;
    height: 1px;
    background: var(--rule);
    margin-bottom: 24px;
  }

  .footer-nav {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .footer-link {
    font-family: 'Inter', sans-serif;
    font-size: 0.8125rem;
    font-weight: 400;
    color: var(--text-faint);
    text-decoration: none;
    letter-spacing: 0.01em;
    transition: color 0.2s ease;
  }

  .footer-link:hover {
    color: var(--text);
  }

  .footer-link:focus-visible {
    outline: 1px solid var(--accent);
    outline-offset: 4px;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .page {
      padding: 0 20px;
    }

    .header {
      padding-top: 72px;
      padding-bottom: 56px;
    }

    .issue-label {
      margin-bottom: 16px;
    }

    .col-header--date {
      width: 100px;
    }

    .entry {
      padding: 16px 0;
    }

    .entry-date {
      width: 100px;
      font-size: 0.75rem;
    }

    .entry-title {
      font-size: 1rem;
    }

    .footer {
      padding: 36px 0 48px;
    }
  }

  @media (max-width: 380px) {
    .col-headers {
      display: none;
    }

    .entry {
      flex-direction: column;
      gap: 4px;
    }

    .entry-date {
      width: auto;
      font-size: 0.6875rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .entry-arrow {
      display: none;
    }
  }
</style>
</head>
<body>

<div class="page">
  <header class="header">
    <p class="issue-label" aria-hidden="true">Index</p>
    <h1 class="title">Flyers</h1>
  </header>

  <div class="rule rule--heavy" aria-hidden="true"></div>

  <div class="col-headers" aria-hidden="true">
    <span class="col-header col-header--date">Date</span>
    <span class="col-header col-header--title">Title</span>
  </div>

  <div class="entries" role="list">
    <a href="/flyers/oktoberfest-sep-2026/" class="entry" role="listitem">
      <time class="entry-date" datetime="2026-09-12">Sat Sep 12</time>
      <span class="entry-info"><span class="entry-title">Oktoberfest Steil 2026</span><span class="entry-time">3:30 PM - ??</span></span>
      <span class="entry-arrow" aria-hidden="true">&rarr;</span>
    </a>
    <div class="entry-alternates">
      <a href="/flyers/oktoberfest-sep-2026/bavarian/" class="entry-alt-link">bavarian</a>
      <span class="entry-alt-sep" aria-hidden="true">&middot;</span>
      <a href="/flyers/oktoberfest-sep-2026/" class="entry-alt-link entry-alt-link--active">vintage</a>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-rule" aria-hidden="true"></div>
    <nav class="footer-nav">
      <a href="/" class="footer-link">&larr; Home</a>
      <a href="/flyers/" class="footer-link">cosmic view &rarr;</a>
    </nav>
  </footer>
</div>

</body>
</html>
