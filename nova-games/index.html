<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Games — Taylor Steil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --cyan:#00d2ff;
    --purple:#7b2ff7;
    --green:#00ff88;
    --navy-1:#0a1628;
    --navy-2:#060d18;
    --text-primary:#e8ecf4;
    --text-muted:#7b8fad;
  }

  html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  body{
    font-family:'Inter',sans-serif;
    background:var(--navy-2);
    color:var(--text-primary);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  .cosmos{
    position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse at 25% 0%,rgba(0,210,255,0.10) 0%,transparent 55%),
      radial-gradient(ellipse at 75% 100%,rgba(138,43,226,0.12) 0%,transparent 55%),
      radial-gradient(ellipse at 50% 50%,rgba(0,255,136,0.04) 0%,transparent 60%),
      linear-gradient(175deg,var(--navy-1) 0%,#0d1230 35%,#110a28 65%,var(--navy-2) 100%);
  }

  .cosmos::after{
    content:'';position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(0,210,255,0.025) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,210,255,0.025) 1px,transparent 1px);
    background-size:48px 48px;
    mask-image:radial-gradient(ellipse at 50% 30%,black 20%,transparent 75%);
    -webkit-mask-image:radial-gradient(ellipse at 50% 30%,black 20%,transparent 75%);
  }

  .orb{position:fixed;border-radius:50%;filter:blur(80px);z-index:0;pointer-events:none}
  .orb--cyan{width:340px;height:340px;background:rgba(0,210,255,0.12);top:-80px;right:-40px;animation:drift-a 18s ease-in-out infinite alternate}
  .orb--purple{width:280px;height:280px;background:rgba(138,43,226,0.15);bottom:60px;left:-90px;animation:drift-b 22s ease-in-out infinite alternate}
  .orb--green{width:200px;height:200px;background:rgba(0,255,136,0.08);top:45%;right:8%;animation:drift-c 15s ease-in-out infinite alternate}

  @keyframes drift-a{0%{transform:translate(0,0)}100%{transform:translate(-30px,40px)}}
  @keyframes drift-b{0%{transform:translate(0,0)}100%{transform:translate(40px,-30px)}}
  @keyframes drift-c{0%{transform:translate(0,0)}100%{transform:translate(-20px,-25px)}}

  .page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:0 24px}
  .accent-bar{width:100%;height:3px;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--green));flex-shrink:0}
  .content{width:100%;max-width:720px;display:flex;flex-direction:column;flex:1;padding:80px 0 48px}

  .page-title{
    font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:clamp(2.8rem,6vw,4.2rem);letter-spacing:-0.03em;line-height:1;
    background:linear-gradient(135deg,var(--cyan) 0%,var(--purple) 50%,var(--green) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:12px;
  }

  .page-subtitle{font-size:0.95rem;color:var(--text-muted);margin-bottom:48px}

  .divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,210,255,0.25),rgba(138,43,226,0.25),transparent);margin-bottom:32px}

  .game-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:16px;
    margin-bottom:auto;
  }

  .game-card{
    display:flex;flex-direction:column;gap:8px;
    padding:24px;text-decoration:none;color:inherit;
    border-radius:14px;
    background:linear-gradient(135deg,rgba(0,210,255,0.04) 0%,rgba(138,43,226,0.03) 50%,rgba(0,255,136,0.02) 100%);
    border:1px solid rgba(255,255,255,0.06);
    position:relative;min-height:120px;
    transition:transform 0.3s cubic-bezier(0.16,1,0.3,1),border-color 0.3s ease,box-shadow 0.3s ease;
  }

  .game-card:hover{
    transform:translateY(-2px) scale(1.015);
    border-color:rgba(0,210,255,0.35);
    box-shadow:0 0 24px rgba(0,210,255,0.12),0 0 48px rgba(138,43,226,0.08),0 8px 32px rgba(0,0,0,0.3);
  }

  .game-card:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  .game-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:1.2rem;font-weight:600;letter-spacing:-0.01em;
    color:var(--text-primary);
  }

  .game-author{font-size:0.8rem;color:var(--text-muted);letter-spacing:0.02em}
  .game-engine{
    margin-top:auto;align-self:flex-start;
    font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:600;
    letter-spacing:0.06em;text-transform:uppercase;color:var(--cyan);
    background:rgba(0,210,255,0.08);border:1px solid rgba(0,210,255,0.18);
    border-radius:20px;padding:4px 10px;
  }

  .empty-state{
    grid-column:1/-1;
    padding:48px 24px;text-align:center;color:var(--text-muted);font-size:0.9rem;
    border:1px dashed rgba(255,255,255,0.08);border-radius:14px;
  }
  .empty-state code{
    font-family:'Space Grotesk',monospace;font-size:0.85rem;
    background:rgba(0,210,255,0.06);padding:2px 6px;border-radius:4px;color:var(--cyan);
  }

  .footer{
    position:relative;margin-top:64px;padding:32px 0;width:100%;
    display:flex;justify-content:space-between;align-items:center;
  }
  .footer::before{
    content:'';position:absolute;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(0,210,255,0.15),rgba(138,43,226,0.15),transparent);
    transform:translateY(-32px);
  }
  .footer-link{font-size:0.85rem;font-weight:500;color:var(--text-muted);text-decoration:none;transition:color 0.2s ease}
  .footer-link:hover{color:var(--text-primary)}
  .footer-link--home::before{content:'← '}

  @media(max-width:480px){
    .content{padding:56px 0 36px}
    .game-card{padding:20px}
    .footer{margin-top:48px;padding:24px 0}
  }
</style>
</head>
<body>

<div class="cosmos"></div>
<div class="orb orb--cyan"></div>
<div class="orb orb--purple"></div>
<div class="orb orb--green"></div>

<div class="page">
  <div class="accent-bar"></div>

  <div class="content">
    <h1 class="page-title">Nova Games</h1>
    <p class="page-subtitle">Games built by the coding club at Nova Middle School.</p>

    <div class="divider"></div>

    <div class="game-grid">
      <a href="./grant-centipede-run/" class="game-card">
      	<span class="game-title">Centipede Run!</span>
      	<span class="game-author">by Grant</span>
      	<span class="game-engine">Pixi.js</span>
      </a>
      <a href="./amelie-teamwork-escape-room/" class="game-card">
      	<span class="game-title">Teamwork Escape Room</span>
      	<span class="game-author">by Amelie</span>
      	<span class="game-engine">Pixi.js</span>
      </a>
      <a href="./ori-cube-challenge/" class="game-card">
      	<span class="game-title">Cube Challenge</span>
      	<span class="game-author">by Ori</span>
      	<span class="game-engine">Three.js</span>
      </a>
      <a href="./phoenix-a-game/" class="game-card">
      	<span class="game-title">Phoenix</span>
      	<span class="game-author">by Phoenix</span>
      	<span class="game-engine">Three.js</span>
      </a>
      <!-- Add your game card below — copy this template:
      <a href="./your-name/" class="game-card">
        <span class="game-title">Your Game Title</span>
        <span class="game-author">by Your Name</span>
        <span class="game-engine">Pixi.js</span>
      </a>
      -->
    </div>

    <div class="footer">
      <a href="/" class="footer-link footer-link--home">Home</a>
    </div>
  </div>
</div>

</body>
</html>
