<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Cube Challenge</title>
		<style>
			:root {
				color-scheme: dark;
				--accent: #2a52be;
				--accent-hot: #3e6fe0;
			}
			html, body {
				margin: 0;
				padding: 0;
				height: 100%;
				overflow: hidden;
				background: #000;
				color: #fff;
				font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
				user-select: none;
				-webkit-user-select: none;
			}
			#game-canvas {
				display: block;
				position: fixed;
				inset: 0;
				width: 100%;
				height: 100%;
				touch-action: none;
			}

			.overlay {
				position: fixed;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-direction: column;
				padding: 24px;
				z-index: 10;
				background: #000;
			}
			.overlay.transparent {
				background: rgba(0, 0, 0, 0.72);
			}
			.overlay.hidden {
				display: none;
			}

			.logo {
				width: min(340px, 70vw);
				height: auto;
				margin-bottom: 24px;
				image-rendering: -webkit-optimize-contrast;
			}

			.sign {
				font-size: clamp(28px, 5vw, 52px);
				font-weight: 800;
				letter-spacing: 0.04em;
				color: #fff;
				margin: 0 0 8px 0;
				text-shadow: 0 0 24px rgba(62, 111, 224, 0.35);
			}
			.tagline {
				font-size: 14px;
				letter-spacing: 0.28em;
				text-transform: uppercase;
				color: #8892b5;
				margin: 0 0 36px 0;
			}

			button.primary {
				font: inherit;
				font-size: 20px;
				font-weight: 700;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				padding: 16px 48px;
				border-radius: 999px;
				border: 2px solid var(--accent);
				background: var(--accent);
				color: #fff;
				cursor: pointer;
				transition: background 0.15s, transform 0.05s, box-shadow 0.15s;
				box-shadow: 0 0 0 0 rgba(62, 111, 224, 0.4);
			}
			button.primary:hover {
				background: var(--accent-hot);
				box-shadow: 0 0 28px 4px rgba(62, 111, 224, 0.35);
			}
			button.primary:active {
				transform: translateY(1px);
			}
			button.ghost {
				font: inherit;
				font-size: 14px;
				letter-spacing: 0.18em;
				text-transform: uppercase;
				padding: 10px 22px;
				margin-top: 20px;
				border-radius: 999px;
				border: 1px solid #2a3350;
				background: transparent;
				color: #aab2ce;
				cursor: pointer;
			}
			button.ghost:hover {
				color: #fff;
				border-color: #4b5a88;
			}

			#hud {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				display: flex;
				justify-content: center;
				padding: 20px;
				pointer-events: none;
				z-index: 5;
			}
			#timer {
				font-variant-numeric: tabular-nums;
				font-size: clamp(36px, 5vw, 56px);
				font-weight: 700;
				letter-spacing: 0.04em;
				color: #fff;
				text-shadow: 0 2px 14px rgba(0, 0, 0, 0.9);
			}

			#controls-hint {
				position: fixed;
				bottom: 16px;
				left: 0;
				right: 0;
				text-align: center;
				font-size: 12px;
				letter-spacing: 0.2em;
				text-transform: uppercase;
				color: #6b7393;
				pointer-events: none;
				z-index: 5;
			}

			#times-list {
				list-style: none;
				padding: 0;
				margin: 0 0 8px 0;
				display: grid;
				gap: 8px;
				min-width: min(320px, 80vw);
			}
			#times-list li {
				display: flex;
				justify-content: space-between;
				padding: 10px 18px;
				background: #101526;
				border: 1px solid #1c2340;
				border-radius: 10px;
				font-variant-numeric: tabular-nums;
			}
			#times-list li .rank {
				color: #6b7393;
				font-weight: 700;
			}
			#times-list .empty {
				color: #6b7393;
				text-align: center;
				padding: 24px;
				font-style: italic;
				background: transparent;
				border: 1px dashed #1c2340;
			}

			.solved-time {
				font-variant-numeric: tabular-nums;
				font-size: clamp(48px, 10vw, 96px);
				font-weight: 800;
				color: #2a52be;
				margin: 16px 0 8px 0;
				text-shadow: 0 0 30px rgba(42, 82, 190, 0.5);
			}
			.solved-label {
				font-size: 16px;
				letter-spacing: 0.28em;
				text-transform: uppercase;
				color: #8892b5;
				margin-bottom: 28px;
			}
		</style>
	</head>
	<body>
		<canvas id="game-canvas"></canvas>

		<div id="hud" class="hidden">
			<div id="timer">0.00</div>
		</div>

		<div id="controls-hint" class="hidden">Click + drag a face to turn &middot; WASD to rotate view</div>

		<div id="menu" class="overlay">
			<img class="logo" src="./logo.png" alt="Cube Challenge" />
			<h1 class="sign">speedcube.com</h1>
			<p class="tagline">Can you solve it?</p>
			<button type="button" id="start-btn" class="primary">Start</button>
			<button type="button" id="times-btn" class="ghost">Best Times</button>
		</div>

		<div id="times" class="overlay transparent hidden">
			<h2 class="sign">Best Times</h2>
			<ol id="times-list"></ol>
			<button type="button" id="times-back" class="ghost">Back</button>
		</div>

		<div id="solved" class="overlay transparent hidden">
			<p class="solved-label">Solved!</p>
			<div id="solved-time" class="solved-time">0.00</div>
			<button type="button" id="solved-menu" class="primary">Menu</button>
		</div>

		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
